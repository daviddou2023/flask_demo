<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environmental Data and GPS Visualization</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 引入高德地图API -->
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=1.4.15&key=dca75fbd0390e9266a7f39814e1197c2"></script>
    <style>
        body {
            display: flex;
            justify-content: space-between;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            display: flex;
            flex-direction: row;
            width: 100%;
        }
        .chart-container {
            width: 30%;
            padding: 10px;
        }
        .map-container {
            width: 60%;
            padding: 10px;
        }
        .empty-container {
            width: 10%;
            padding: 10px;
        }
        #mapContainer {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chart-container">
            <canvas id="lineChart"></canvas>
        </div>
        <div class="map-container">
            <div id="mapContainer"></div>
        </div>
        <div class="empty-container">
            <!-- 右侧空白区域 -->
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
