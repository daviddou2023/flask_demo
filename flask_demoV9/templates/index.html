<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塔吊工人作业安全监管系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 引入 ECharts 主库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@latest/dist/echarts.min.js"></script>
    <!-- 引入 liquidFill 插件 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts-liquidfill@latest/dist/echarts-liquidfill.min.js"></script>
    <!-- 引入高德地图API -->
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=1.4.15&key=dca75fbd0390e9266a7f39814e1197c2"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .header {
            text-align: center;
            padding: 10px;
            font-size: 24px;
            font-weight: bold;
            background-color: #f8f9fa;
        }
        .container {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 90%;  /* 剩余空间 */
        }
        .chart-container {
            width: 25%;
            display: flex;
            flex-direction: column;
            padding: 10px;
            overflow-y: scroll;  /* 支持垂直滚动 */
        }
        .chart-item {
            flex: 1;
            margin-bottom: 10px;
        }
        .map-container {
            width: 50%;
            padding: 10px;
        }
        .video-container {
            width: 25%;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            flex-direction: column; /* 更改为列方向布局 */
        }
        #mapContainer {
            width: 100%;
            height: 100%;
        }
        #videoFeed {
            width: 100%;
            height: auto;
            border: 1px solid #ccc;
            margin-top: 10px; /* 增加顶部边距 */
        }
        #monitorBtn, #reminderBtn {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px; /* 增加顶部边距 */
        }
         .gauge-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        #riskGauge, #fatigueGauge {
            width: 48%;
            height: 200px;
        }
        #riskLevelText, #fatigueLevelText {
            font-size: 18px;
            text-align: center;

        }
    </style>
</head>
<body>
    <div class="header">
        塔吊工人作业安全监管系统
    </div>
    <div class="container">
        <div class="chart-container">
            <div class="chart-item">
                <canvas id="co2Chart"></canvas>
            </div>
            <div class="chart-item">
                <canvas id="ch2oChart"></canvas>
            </div>
            <div class="chart-item">
                <canvas id="tvocChart"></canvas>
            </div>
            <div class="chart-item">
                <canvas id="pm25Chart"></canvas>  <!-- PM2.5折线图 -->
            </div>
            <div class="chart-item">
                <canvas id="pm10Chart"></canvas>  <!-- PM10折线图 -->
            </div>
            <div class="chart-item">
                <canvas id="tempChart"></canvas>  <!-- 温度折线图 -->
            </div>
            <div class="chart-item">
                <canvas id="humChart"></canvas>  <!-- 湿度折线图 -->
            </div>
        </div>
        <div class="map-container">
            <div id="mapContainer"></div>
        </div>
        <div class="video-container">
            <img id="videoFeed" src="{{ url_for('video_feed') }}" alt="视频流">  <!-- 视频流在最上方 -->
            <button id="monitorBtn">远程监控</button>  <!-- 远程监控按钮在视频流下方 -->
            <button id="reminderBtn">远程提醒</button>  <!-- 远程提醒按钮在监控按钮下方 -->
            <div class="gauge-container">
                <div id="riskGauge"></div>
                <div id="fatigueGauge"></div>
            </div>
            <div id="riskLevelText"></div>
            <div id="fatigueLevelText"></div>

        </div>
    </div>
    <script>
        // 初始化图表
        // 初始化图表
        const co2ChartCtx = document.getElementById('co2Chart').getContext('2d');
        const co2Chart = new Chart(co2ChartCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'CO2',
                    data: [],
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',  // 透明背景色
                    borderColor: 'rgba(255, 99, 132, 1)',  // 边框色
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

        // 初始化其他图表
        const ch2oChartCtx = document.getElementById('ch2oChart').getContext('2d');
        const ch2oChart = new Chart(ch2oChartCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'CH2O',
                    data: [],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',  // 透明背景色
                    borderColor: 'rgba(54, 162, 235, 1)',  // 边框色
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

        const tvocChartCtx = document.getElementById('tvocChart').getContext('2d');
        const tvocChart = new Chart(tvocChartCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'TVOC',
                    data: [],
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',  // 透明背景色
                    borderColor: 'rgba(75, 192, 192, 1)',  // 边框色
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

        const pm25ChartCtx = document.getElementById('pm25Chart').getContext('2d');
        const pm25Chart = new Chart(pm25ChartCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'PM2.5',
                    data: [],
                    backgroundColor: 'rgba(153, 102, 255, 0.2)',  // 透明背景色
                    borderColor: 'rgba(153, 102, 255, 1)',  // 边框色
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

        const pm10ChartCtx = document.getElementById('pm10Chart').getContext('2d');
        const pm10Chart = new Chart(pm10ChartCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'PM10',
                    data: [],
                    backgroundColor: 'rgba(255, 206, 86, 0.2)',  // 透明背景色
                    borderColor: 'rgba(255, 206, 86, 1)',  // 边框色
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

        const tempChartCtx = document.getElementById('tempChart').getContext('2d');
        const tempChart = new Chart(tempChartCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Temperature',
                    data: [],
                    backgroundColor: 'rgba(255, 159, 64, 0.2)',  // 透明背景色
                    borderColor: 'rgba(255, 159, 64, 1)',  // 边框色
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

        const humChartCtx = document.getElementById('humChart').getContext('2d');
        const humChart = new Chart(humChartCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Humidity',
                    data: [],
                    backgroundColor: 'rgba(99, 255, 132, 0.2)',  // 透明背景色
                    borderColor: 'rgba(99, 255, 132, 1)',  // 边框色
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });


        // 更新环境传感器数据的函数
        function updateEnvData() {
            fetch('/api/get_latest_data')
                .then(response => response.json())
                .then(data => {
                    const now = new Date().toLocaleTimeString();
                    const env = data.env;

                    co2Chart.data.labels.push(now);
                    co2Chart.data.datasets[0].data.push(env.co2);
                    co2Chart.update();

                    ch2oChart.data.labels.push(now);
                    ch2oChart.data.datasets[0].data.push(env.ch2o);
                    ch2oChart.update();

                    tvocChart.data.labels.push(now);
                    tvocChart.data.datasets[0].data.push(env.tvoc);
                    tvocChart.update();

                    pm25Chart.data.labels.push(now);
                    pm25Chart.data.datasets[0].data.push(env.pm2_5);
                    pm25Chart.update();

                    pm10Chart.data.labels.push(now);
                    pm10Chart.data.datasets[0].data.push(env.pm10);
                    pm10Chart.update();

                    tempChart.data.labels.push(now);
                    tempChart.data.datasets[0].data.push(env.temp);
                    tempChart.update();

                    humChart.data.labels.push(now);
                    humChart.data.datasets[0].data.push(env.hum);
                    humChart.update();
                });
        }

        // 定期更新环境数据
        setInterval(updateEnvData, 1000); // 每5秒更新一次

         // 初始化高德地图
        var map = new AMap.Map('mapContainer', {
            // 启用地图旋转功能
            rotateEnable: true,
            // 启用地图大小可调整功能
            resizeEnable: true,
            // 启用地图俯仰角度控制
            pitchEnable: true,
            // 设置地图初始缩放级别
            zoom: 17,
            // 设置地图初始俯仰角度
            pitch: 50,
            // 设置地图初始旋转角度
            rotation: -15,
            // 设置地图的显示模式为3D
            viewMode: '3D',
            // 设置地图缩放级别的范围
            zooms: [2, 20],
            layers: [
                    new AMap.TileLayer()
                ]
        });
        // 添加 3D 罗盘控制
        AMap.plugin(['AMap.ControlBar'], function() {
            // 在地图上添加罗盘控制组件
            map.addControl(new AMap.ControlBar());
        });
<!--        // 添加卫星图层-->
<!--        var satelliteLayer = new AMap.TileLayer.Satellite();-->
<!--        // 将卫星图层添加到地图中-->
<!--        satelliteLayer.setMap(map);-->
        // 添加楼块图层
        var buildingsLayer = new AMap.Buildings({
            // 设置楼块图层的显示范围（缩放级别）
            zooms: [16, 18],
            // 设置楼块图层的层级
            zIndex: 10,
            // 设置楼块的高度系数
            heightFactor: 2
        });
        // 将楼块图层添加到地图中
<!--        map.add(buildingsLayer);-->
        // 设置地图样式为“light”样式，并重新添加楼块图层
<!--        map.setMapStyle('amap://styles/light');-->
<!--        map.addLayer(buildingsLayer);-->

        var marker = new AMap.Marker();
        map.add(marker);

        // 更新GPS数据的函数
        function updateGpsData() {
            fetch('/api/get_latest_data')
                .then(response => response.json())
                .then(data => {
                    const gps = data.gps;
                    const position = [gps.longitude, gps.latitude];
                    marker.setPosition(position);
                    map.setCenter(position);
                });
        }

        // 定期更新GPS数据
        setInterval(updateGpsData, 1000); // 每5秒更新一次
        // 初始化水滴图
        var riskGauge = echarts.init(document.getElementById('riskGauge'));
        function updateRiskLevel() {
            fetch('/api/get_latest_data')
                .then(response => response.json())
                .then(data => {
                    const riskLevel = data.env.risk_level;

                    var option = {
                        series: [{
                            type: 'liquidFill',
                            data: [riskLevel],
                            radius: '80%',
                            outline: { show: false },
                            backgroundStyle: {
                                color: '#fff'
                            },
                            label: {
                                normal: {
                                    formatter: () => '风险等级: ' + (riskLevel * 100).toFixed(2) + '%',
                                    textStyle: {
                                        fontSize: 20
                                    }
                                }
                            },
                            itemStyle: {
                                color: riskLevel < 0.3 ? '#00c853' :
                                       riskLevel < 0.6 ? '#0288d1' :
                                       riskLevel < 0.8 ? '#ff9800' : '#d32f2f'
                            }
                        }]
                    };

                    riskGauge.setOption(option);

                    var riskText = riskLevel < 0.3 ? '无风险' :
                                   riskLevel < 0.6 ? '轻度风险' :
                                   riskLevel < 0.8 ? '中度风险' : '重度风险';
                    document.getElementById('riskLevelText').textContent = riskText;
                });
        }

        // 每秒钟更新一次risk_level
        setInterval(updateRiskLevel, 1000);
        // Fatigue Level Gauge
        var fatigueGauge = echarts.init(document.getElementById('fatigueGauge'));
        function updateFatigueLevel() {
            fetch('/api/get_latest_data')
                .then(response => response.json())
                .then(data => {
                    const fatigueLevel = data.fatigue_level;
                    var option = {
                        series: [{
                            type: 'liquidFill',
                            data: [fatigueLevel],
                            radius: '80%',
                            outline: { show: false },
                            backgroundStyle: { color: '#fff' },
                            label: {
                                normal: {
                                    formatter: () => '疲劳等级: ' + (fatigueLevel * 100).toFixed(2) + '%',
                                    textStyle: { fontSize: 20 }
                                }
                            },
                            itemStyle: {
                                color: fatigueLevel < 0.3 ? '#00c853' :
                                       fatigueLevel < 0.6 ? '#0288d1' :
                                       fatigueLevel < 0.8 ? '#ff9800' : '#d32f2f'
                            }
                        }]
                    };
                    fatigueGauge.setOption(option);
                    document.getElementById('fatigueLevelText').textContent =
                        fatigueLevel < 0.3 ? '无疲劳' :
                        fatigueLevel < 0.6 ? '轻度疲劳' :
                        fatigueLevel < 0.8 ? '中度疲劳' : '重度疲劳';
                });
        }
         setInterval(updateFatigueLevel, 1000); // Update fatigue level every second


        // 远程监控按钮点击事件
        document.getElementById('monitorBtn').addEventListener('click', function() {
            fetch('{{ url_for("remote_monitor") }}', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    // 将视频流的源更新为远程监控的地址
                    document.getElementById('videoFeed').src = '{{ url_for("video_feed") }}';
<!--                    alert("远程监控已开启！");-->
                });
        });

        // 远程提醒按钮点击事件
        document.getElementById('reminderBtn').addEventListener('click', function() {
            fetch('{{ url_for("remote_reminder") }}', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    alert("远程提醒已发送！");
                });
        });
    </script>
</body>
</html>
