<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塔吊工人作业安全监管系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 引入高德地图API -->
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=1.4.15&key=dca75fbd0390e9266a7f39814e1197c2"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .header {
            text-align: center;
            padding: 10px;
            font-size: 24px;
            font-weight: bold;
            background-color: #f8f9fa;
        }
        .container {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 90%;  /* 剩余空间 */
        }
        .chart-container {
            width: 25%;
            display: flex;
            flex-direction: column;
            padding: 10px;
            overflow-y: scroll;  /* 支持垂直滚动 */
        }
        .chart-item {
            flex: 1;
            margin-bottom: 10px;
        }
        .map-container {
            width: 50%;
            padding: 10px;
        }
        .video-container {
            width: 25%;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            flex-direction: column; /* 更改为列方向布局 */
        }
        #mapContainer {
            width: 100%;
            height: 100%;
        }
        #videoFeed {
            width: 100%;
            height: auto;
            border: 1px solid #ccc;
            margin-top: 10px; /* 增加顶部边距 */
        }
        #monitorBtn, #reminderBtn {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px; /* 增加顶部边距 */
        }
    </style>
</head>
<body>
    <div class="header">
        塔吊工人作业安全监管系统
    </div>
    <div class="container">
        <div class="chart-container">
            <div class="chart-item">
                <canvas id="co2Chart"></canvas>
            </div>
            <div class="chart-item">
                <canvas id="ch2oChart"></canvas>
            </div>
            <div class="chart-item">
                <canvas id="tvocChart"></canvas>
            </div>
            <div class="chart-item">
                <canvas id="pm25Chart"></canvas>  <!-- 新增PM2.5折线图 -->
            </div>
            <div class="chart-item">
                <canvas id="pm10Chart"></canvas>  <!-- 新增PM10折线图 -->
            </div>
            <div class="chart-item">
                <canvas id="tempChart"></canvas>  <!-- 新增温度折线图 -->
            </div>
            <div class="chart-item">
                <canvas id="humChart"></canvas>  <!-- 新增湿度折线图 -->
            </div>
        </div>
        <div class="map-container">
            <div id="mapContainer"></div>
        </div>
        <div class="video-container">
            <button id="monitorBtn">远程监控</button>  <!-- 新增“远程监控”按钮 -->
            <img id="videoFeed" src="{{ url_for('video_feed') }}" alt="视频流">
            <button id="reminderBtn">远程提醒</button>  <!-- 远程提醒按钮 -->
        </div>
    </div>
    <script>
        // 远程监控按钮点击事件
        document.getElementById('monitorBtn').addEventListener('click', function() {
            fetch('{{ url_for("remote_monitor") }}', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    // 将视频流的源更新为远程监控的地址
                    document.getElementById('videoFeed').src = data.video_url;
                })
                .catch(error => alert('请求失败: ' + error));
        });

        // 远程提醒按钮点击事件
        document.getElementById('reminderBtn').addEventListener('click', function() {
            fetch('{{ url_for("remote_reminder") }}', { method: 'POST' })
                .then(response => response.json())
                .then(data => alert(data.message))
                .catch(error => alert('请求失败: ' + error));
        });
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
